<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ranking List</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Poppins', 'sans-serif'],
        }
      }
    }
  }
</script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased p-4 md:p-8 min-h-screen">

  <div class="max-w-5xl mx-auto space-y-6">
    
    <header>
      <h1 class="text-3xl font-bold tracking-tight text-slate-900 mb-1">Rankings</h1>
      <p class="text-sm text-slate-500 font-mono">Competition standings — all participants</p>
    </header>

    <div class="flex flex-col sm:flex-row gap-4">
      <div class="relative flex-1">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input type="text" id="search" placeholder="Search name..." class="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none font-mono text-sm transition-all" oninput="render()" />
      </div>
      
      <select id="filter" class="px-4 py-2.5 border border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none font-mono text-sm bg-white cursor-pointer transition-all" onchange="render()">
        <option value="all">All participants</option>
        <option value="active">With scores only</option>
        <option value="zero">Zero scores only</option>
      </select>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="summary"></div>

    <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm text-left whitespace-nowrap">
          <thead class="bg-slate-100 border-b border-slate-200">
            <tr>
              <th onclick="sortBy('rank')" class="px-6 py-3.5 text-xs font-semibold text-slate-600 uppercase tracking-wider font-mono cursor-pointer hover:bg-slate-200 transition-colors w-24"># Rank</th>
              <th onclick="sortBy('name')" class="px-6 py-3.5 text-xs font-semibold text-slate-600 uppercase tracking-wider font-mono cursor-pointer hover:bg-slate-200 transition-colors">Name</th>
              <th onclick="sortBy('score')" class="px-6 py-3.5 text-xs font-semibold text-slate-600 uppercase tracking-wider font-mono cursor-pointer hover:bg-slate-200 transition-colors text-right">Score</th>
              <th class="px-6 py-3.5 text-xs font-semibold text-slate-600 uppercase tracking-wider font-mono hidden sm:table-cell w-48">Distribution</th>
            </tr>
          </thead>
          <tbody id="tbody" class="divide-y divide-slate-100"></tbody>
        </table>
      </div>
    </div>
    
  </div>

<script>
const raw = [
  ["Chuquichanca, David",101.25],["Lopez, Roberto",0],["Peña, Ruth",71],["Purizaca, Edson",217],["Aguilar, Ximena",68],["Aspajo, Alvin",0],["Falcon, Mario",51],["Marquez, Lia",237.75],["Sabitu, Hafsa",91.8],["Sanchez, Xiomara",0],["Sacbaja, Ajbe",54.5],["Corpuz, Lory",55.25],["Diergaardt, Claudio",8.66],["Hernadez, Alexa",54],["Torres, Laura",105],["Camacho, Mariela",32],["Marin, Claudia",142.75],["Corpuz, Riz",134],["Southall, Jamaica",27],["Lariba, Esperanza",94.5],["Hussain, Aliyu",52],["Ilaida, Cherry",43.5],["Adam, Daylen",0],["Castro, Sara",0],["Martinez, Carolina",67.08],["Eke, Martha",12],["Osorio, Grecia",0],["Correa, Wendy",80],["Sierra, Sara",212],["Loo, Jose",0],["Hernandez, Andres",173.25],["Rozo, Eduardo",39.5],["Shode, Dolapo",94.3],["Gavilanga, Marta",61],["Dubon, Karina",0],["Arguelles, Miranda",48.5],["Ramon, Bryan",141],["Alvarado, Erika",0],["Portales, Maria",114.25],["Carrillo, Astrid",90.25],["Nunez, Paulina",19],["Farías, Sofia",28.5],["Lopez, Fernanda",29.55],["Juarez, Lautaro",178],["Rodriguez, Sebastian",189.2],["Marin, Jashira",53.3],["Osuna, Andrea",54],["Delgado, Jose",109.5],["Criollo, Luis",71],["Blessing, Terngu",0],["Garcia, Mayra",74.6],["Gonzalez, Luz",0],["Salomon, Emanuel",43.58],["Dimaano, Leihf",114.97],["Fortes, Gia",0],["Amaya, Pamela",0],["Hernandez, Jennifer",278.5],["Gabriel, Fernanda",2.5],["Hernandez, Iris",0],["Sanchez, Luis",0],["Saavedra, Roniel",0],["Aguilar, Charisma",64.95],["Galvan, Jorge",1.5],["Castaño, Irish Gealic",56.67],["VanDort, Simonna",76],["Peralta, Jorge",83],["Cecilia, Alva",0],["Lopez, Ferliza",74.71],["Pedotti, Alan",56.6],["Techon, Monica",125.75],["Corrales, Jessie",10],["Villalona, Carlo",0],["Castañeda, Leticia",15],["Pica, Rafael",0],["Alombro, Albert",22],["Sompaya Nyame, Innocent",32],["Bantayan, Rachell",0],["Garcia, Nathaly",1],["Bargo, John Oscar Keith",22],["Rangel, Alessandra",31.5],["Carriaga, Angelica",70],["Cuarto, Ken Andrei",58],["Hayag, Ma. Aurora",111.1],["Appendino, Maximo",15],["Argüelles, Rodrigo",42.1],["Bagatello, Giuliana",1.5],["Kaye, Zyra",69.5],["Ismaila Zakari, Muhammad",72.25],["Rosales, Kenneth Jairo",75],["Benyin, Prince",17],["Onumonu, Wali Gesiere",21],["Habib, Aisha",29.5],["Imaz, Gabriel Agustin",214],["Romagnoli Ochoa, Monica",123.75],["Genson, Jeanny",42.13],["Lucas, Princess Hanna",79.92],["Padin, Orlando Jr.",0],["Jabo, Umar",75.9],["Castellanos, Maricarmen",0],["Sabitu, Asmau",87],["Ofalsa, Dianna",80],["Merculesio, Macy",0],["Joy, Michelle",30],["Miuweme, Theresa",33],["Diaz, Jairi",1.5],["Gonzalez, Ariana",1.5],["De Marte, Jagaira",1.5],["Purizaca, Brandi",0],["Garcia, Vivian",1.5],["Nwankpa, Esther",0],["Marrufo, Andrea",19.5],["Ugwuanyi, Collins",0],["Rallos, Cylyn Jay D.",17.5],["Yaro, Mufida",73],["Rosas, Dulce",45],["S. Lariba, Juna Mae",53.7],["Palado, Kayla",58.5],["Arrellano, Floyd",54.67],["Victoria, John Sherwin",54.5],["Francess, Mary",16.98],["Asencio, Pamela",40.9],["Joel, Ajibola",6],["Okedi, Mary",3],["Espeche, Florencia",7],["Caraig, Kyle",10.5],["Talavera, Jenny",98.25],["Rei, Kerby",79.4],["Prasenan, Imee Diane",7],["Cebreros, Angel",7],["Bie, Athasia Angel",0],["Sanusi, Ahmad",4],["Bastias, Sofia",6]
].filter(d => d[0].trim() !== "");

const maxScore = Math.max(...raw.map(d=>d[1]));
let sortField = 'score', sortDir = -1;

function sortBy(f) {
  if (sortField === f) sortDir *= -1;
  else { sortField = f; sortDir = f === 'name' ? 1 : -1; }
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filt = document.getElementById('filter').value;
  let data = raw.filter(d => {
    if (q && !d[0].toLowerCase().includes(q)) return false;
    if (filt === 'active' && d[1] === 0) return false;
    if (filt === 'zero' && d[1] > 0) return false;
    return true;
  });
  const sorted = [...raw].sort((a,b) => b[1]-a[1]);
  data.sort((a,b) => {
    if (sortField === 'name') return sortDir * a[0].localeCompare(b[0]);
    if (sortField === 'rank') return sortDir * (sorted.findIndex(x=>x[0]===a[0]) - sorted.findIndex(x=>x[0]===b[0]));
    return sortDir * (a[1]-b[1]);
  });

  const active = raw.filter(d=>d[1]>0).length;
  const avg = raw.reduce((s,d)=>s+d[1],0) / active;
  
  // Render Summary Cards
  document.getElementById('summary').innerHTML = `
    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-center transition-all hover:shadow-md">
      <div class="text-[11px] text-slate-500 uppercase tracking-widest font-mono mb-1.5">Participants</div>
      <div class="text-3xl font-light text-slate-800">${raw.length}</div>
    </div>
    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-center transition-all hover:shadow-md">
      <div class="text-[11px] text-slate-500 uppercase tracking-widest font-mono mb-1.5">With Scores</div>
      <div class="text-3xl font-light text-slate-800">${active}</div>
    </div>
    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-center transition-all hover:shadow-md">
      <div class="text-[11px] text-slate-500 uppercase tracking-widest font-mono mb-1.5">Top Score</div>
      <div class="text-3xl font-light text-blue-600">${maxScore.toFixed(2)}</div>
    </div>
    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-center transition-all hover:shadow-md">
      <div class="text-[11px] text-slate-500 uppercase tracking-widest font-mono mb-1.5">Avg (Active)</div>
      <div class="text-3xl font-light text-slate-800">${avg.toFixed(1)}</div>
    </div>
  `;

  // Render Table
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('tbody').innerHTML = data.map(d => {
    const globalRank = sorted.findIndex(x=>x[0]===d[0]) + 1;
    const pct = maxScore > 0 ? (d[1]/maxScore*100) : 0;
    const isTop = globalRank <= 3 && d[1] > 0;
    
    // Tailwind classes logic
    const medalEl = isTop ? `<span class="mr-2 text-lg">${medals[globalRank-1]}</span>` : '';
    const rankClass = isTop ? 'text-yellow-600 font-bold' : 'text-slate-400';
    const scoreClass = d[1] === 0 ? 'text-slate-400' : 'text-slate-700 font-medium';
    
    return `<tr class="hover:bg-slate-50 transition-colors group">
      <td class="px-6 py-4 font-mono ${rankClass} flex items-center h-full">
        ${medalEl}${d[1]>0 ? globalRank : '—'}
      </td>
      <td class="px-6 py-4 text-slate-800 font-medium">${d[0]}</td>
      <td class="px-6 py-4 text-right font-mono ${scoreClass}">${d[1].toFixed(2)}</td>
      <td class="px-6 py-4 hidden sm:table-cell align-middle">
        <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden border border-slate-200/50">
          <div class="bg-blue-500 h-full rounded-full transition-all duration-500 ease-out group-hover:bg-blue-600" style="width:${pct.toFixed(1)}%"></div>
        </div>
      </td>
    </tr>`;
  }).join('');
}
render();
</script>
</body>
</html>
